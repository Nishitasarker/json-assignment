<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cover Page</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
    .myicon{
        font-size: 130px;
        margin: auto;
        padding-top: 32px;
    }
</style>
</head>
<body>
    <section class="mx-[30px] px-5 lg:mx-[400px] px-8">
 
        <div class="flex flex-col justify-center text-center space-y-1">
            <i  class="fa-brands fa-square-github myicon"></i>
            <h1 class="font-bold text-3xl mt-2">GitHub Issues Tracker</h1>
            <p class="text-gray-500">Sign in to manage your issues</p>
        </div>

        <div class="space-y-1">
           <p class="font-semibold mt-2">Username</p> 
           <input type="text" id="username" placeholder="Enter Username" class="w-full rounded-xl p-1  ">
           <p class="text-purple-500">Default:admin</p>
        </div>

        <div class="space-y-1">
            <p class="font-semibold mt-2">Password</p> 
           <input type="password" id="password" placeholder="Enter Password" class="w-full rounded-xl p-1">
           <p class="text-purple-500">Default:admin123</p>
        </div>

        <button onclick="signin()" class="text-white bg-purple-900 w-full rounded-xl p-1 mt-2">Sign In</button>

        <div class=" text-gray-600 my-2 ">-----------------------------<span class="font-semibold text-black">OR</span>------------------------------</div>

        <div class="flex flex-col justify-center text-center bg-sky-100">
            <p class="mt-1 mb-3 text-gray-500">Demo Credentials:</p>
            <div>
                <p class="font-bold">Username: <span class="text-gray-700">admin</span></p>
                <p class="mb-4 font-bold">Password: <span class="text-gray-700 ">admin123</span></p>
            
            </div>
        </div>
    </section>



    <script>
        function signin() {
            let user=document.getElementById("username").value;
            let pass=document.getElementById("password").value;
        if(user=="admin" && pass=="admin123"){
            window.location="index.html";
        }
        
        }
    </script>
</body>
</html>
